<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C-GAB暗記">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>C-GAB 解答集 暗記ツール</title>
<style>
:root{
  --bg:#0f1117; --card:#1a1d27; --card2:#232734; --text:#e8eaf0; --sub:#9aa0b0;
  --accent:#5b8cff; --green:#3ecf8e; --red:#ff6b6b; --yellow:#ffd166; --border:#2c3040;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%; color-scheme:dark;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overscroll-behavior-y:none;}
button,input{touch-action:manipulation;}
header{padding:calc(env(safe-area-inset-top) + 12px) calc(env(safe-area-inset-right) + 14px) 8px calc(env(safe-area-inset-left) + 14px);position:sticky;top:0;background:rgba(15,17,23,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);z-index:10;border-bottom:1px solid var(--border);}
h1{font-size:16px;margin:0 0 10px;font-weight:700;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 15px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--sub);font-size:13px;white-space:nowrap;cursor:pointer;font-weight:600;flex-shrink:0;}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.controls{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap;align-items:center;}
.controls input[type=search]{flex:1;min-width:130px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;appearance:none;}
.btn{padding:11px 13px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;font-weight:600;min-height:42px;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.small{padding:7px 12px;font-size:12px;min-height:34px;}
.btn.on{background:var(--card2);border-color:var(--accent);color:var(--accent);}
main{padding:0 14px calc(env(safe-area-inset-bottom) + 40px);max-width:720px;margin:0 auto;}
.stats{font-size:12px;color:var(--sub);padding:0 16px 6px;max-width:720px;margin:0 auto;}
.progressbar{height:5px;background:var(--card);border-radius:3px;overflow:hidden;margin:4px 0 8px;}
.progressbar > div{height:100%;background:var(--green);transition:width .3s;}

/* card mode */
.study-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px 16px;margin-top:12px;min-height:200px;display:flex;flex-direction:column;cursor:pointer;user-select:none;-webkit-user-select:none;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:8px;background:var(--card2);color:var(--sub);margin-right:6px;}
.badge.diff{color:var(--yellow);}
.badge.done{color:var(--green);border:1px solid var(--green);background:transparent;}
.qtext{font-size:17px;line-height:1.75;margin:12px 0;flex:1;white-space:pre-wrap;}
.qtext .stmt{display:block;margin:8px 0;font-size:15px;}
.reveal-hint{text-align:center;color:var(--sub);font-size:14px;padding:16px 0 6px;}
.answer{border-top:1px dashed var(--border);margin-top:10px;padding-top:14px;}
.answer .ans{font-size:20px;font-weight:700;color:var(--green);line-height:1.6;white-space:pre-wrap;}
.answer .memo{font-size:14px;color:var(--yellow);margin-top:8px;line-height:1.7;white-space:pre-wrap;}
.ans-row{display:flex;gap:10px;margin:7px 0;font-size:15px;align-items:baseline;}
.ans-row .letter{font-weight:800;color:var(--green);min-width:24px;font-size:18px;}
.judge{display:flex;gap:10px;margin-top:14px;}
.judge .btn{flex:1;padding:16px;font-size:16px;border-radius:14px;min-height:54px;}
.judge .ok{background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green);}
.judge .ng{background:rgba(255,107,107,.12);border-color:var(--red);color:var(--red);}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px;}
.nav .btn{min-width:84px;padding:13px;}
.counter{color:var(--sub);font-size:13px;}

/* list mode */
.list-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-top:10px;}
.list-item .q{font-size:14px;line-height:1.6;white-space:pre-wrap;}
.list-item .a{font-size:14px;color:var(--green);font-weight:700;margin-top:6px;white-space:pre-wrap;line-height:1.6;}
.list-item .m{font-size:12px;color:var(--yellow);margin-top:4px;white-space:pre-wrap;}
.list-item .meta{font-size:11px;color:var(--sub);margin-bottom:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hidden-a{filter:blur(6px);cursor:pointer;transition:filter .15s;}
.hidden-a.shown{filter:none;}
.empty{text-align:center;color:var(--sub);padding:60px 0;font-size:14px;line-height:2;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 8px;max-width:720px;margin:0 auto;}
.fumidai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.fumidai-grid div{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-size:13px;}
.note{font-size:12px;color:var(--sub);line-height:1.8;margin-top:12px;}
@media(min-width:600px){.fumidai-grid{grid-template-columns:1fr 1fr 1fr;}}
</style>
</head>

  gengo: _RAW.g.map(r=>({theme:r[0],items:r[1].map(x=>({stmt:x[0],ans:x[1],memo:x[2]}))})),
  eigo:  _RAW.e.map(r=>({theme:r[0],items:r[1].map(x=>({q:x[0],ans:x[1],memo:x[2]}))})),
  fumidai: _RAW.f
};

const TABS = [
  {id:'keisu', label:'計数 ('+DATA.keisu.length+')'},
  {id:'gengo', label:'言語 ('+DATA.gengo.length+')'},
  {id:'eigo', label:'英語 ('+DATA.eigo.length+')'},
  {id:'fumidai', label:'踏み台企業'}
];

let state = {
  tab:'keisu',
  mode:'card',           // card | quiz | list
  quiz:{queue:[], pos:0, answered:false, choice:-1, right:0, wrong:0, wrongs:[], options:[]},
  search:'',
  diffFilter:'all',      // all | none | 1 | 2 | 3+
  onlyUnlearned:false,
  order:{},              // tab -> array of indices (shuffled or sequential)
  pos:{keisu:0,gengo:0,eigo:0},
  revealed:false,
  learned:{keisu:{},gengo:{},eigo:{}},   // id -> true
  listShown:{}
};

// ---- persistence (best-effort) ----
async function loadProgress(){
  try{
    let v=null;
    if(window.storage){
      const r = await window.storage.get('cgab-progress');
      if(r && r.value) v = r.value;
    } else if(window.localStorage){
      v = localStorage.getItem('cgab-progress');
    }
    if(v){
      const p = JSON.parse(v);
      if(p.learned) state.learned = Object.assign(state.learned, p.learned);
      if(p.pos) state.pos = Object.assign(state.pos, p.pos);
    }
  }catch(e){}
}
let saveTimer=null;
function saveProgress(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const payload = JSON.stringify({learned:state.learned, pos:state.pos});
    try{
      if(window.storage){ await window.storage.set('cgab-progress', payload); }
      else if(window.localStorage){ localStorage.setItem('cgab-progress', payload); }
    }catch(e){}
  }, 400);
}

// ---- helpers ----
function itemId(tab, idx){
  if(tab==='keisu'){const it=DATA.keisu[idx];return 'k'+(it.num||idx)+'_'+it.q.slice(0,10);}
  if(tab==='gengo'){return 'g'+idx+'_'+DATA.gengo[idx].theme.slice(0,10);}
  return 'e'+idx+'_'+DATA.eigo[idx].theme.slice(0,10);
}
function diffStars(d){return d ? d : '無印';}
function diffCat(d){
  const n=(d.match(/★/g)||[]).length;
  if(n===0)return 'none'; if(n===1)return '1'; if(n===2)return '2'; return '3+';
}
function matches(text, q){return text.toLowerCase().includes(q.toLowerCase());}

function filteredIndices(tab){
  const q = state.search.trim();
  let idxs = [];
  if(tab==='keisu'){
    DATA.keisu.forEach((it,i)=>{
      if(state.diffFilter!=='all' && diffCat(it.diff)!==state.diffFilter) return;
      if(q && !(matches(it.q,q)||matches(it.ans,q)||matches(it.memo||'',q)||matches(it.num||'',q))) return;
      if(state.onlyUnlearned && state.learned.keisu[itemId('keisu',i)]) return;
      idxs.push(i);
    });
  } else if(tab==='gengo'){
    DATA.gengo.forEach((g,i)=>{
      if(q && !(matches(g.theme,q)||g.items.some(x=>matches(x.stmt,q)))) return;
      if(state.onlyUnlearned && state.learned.gengo[itemId('gengo',i)]) return;
      idxs.push(i);
    });
  } else if(tab==='eigo'){
    DATA.eigo.forEach((g,i)=>{
      if(q && !(matches(g.theme,q)||g.items.some(x=>matches(x.q,q)||matches(x.ans,q)))) return;
      if(state.onlyUnlearned && state.learned.eigo[itemId('eigo',i)]) return;
      idxs.push(i);
    });
  }
  // apply stored order if shuffled
  const ord = state.order[tab];
  if(ord){
    const set = new Set(idxs);
    idxs = ord.filter(i=>set.has(i));
  }
  return idxs;
}

function shuffleTab(){
  const tab = state.tab;
  let n = tab==='keisu'?DATA.keisu.length: tab==='gengo'?DATA.gengo.length : DATA.eigo.length;
  const arr = Array.from({length:n},(_,i)=>i);
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  state.order[tab]=arr; state.pos[tab]=0; state.revealed=false; render();
}
function resetOrder(){delete state.order[state.tab]; state.pos[state.tab]=0; state.revealed=false; render();}

// ---- rendering ----
function render(){
  renderTabs(); renderStats(); renderChips(); renderControls(); renderMain();
}

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  TABS.forEach(t=>{
    const b=document.createElement('div');
    b.className='tab'+(state.tab===t.id?' active':'');
    b.textContent=t.label;
    b.onclick=()=>{state.tab=t.id;state.revealed=false;render();};
    el.appendChild(b);
  });
}

function renderStats(){
  const el=document.getElementById('stats');
  if(state.tab==='fumidai'){el.innerHTML='';return;}
  const tab=state.tab;
  let total = tab==='keisu'?DATA.keisu.length: tab==='gengo'?DATA.gengo.length : DATA.eigo.length;
  let done=0;
  for(let i=0;i<total;i++) if(state.learned[tab][itemId(tab,i)]) done++;
  const pct = total?Math.round(done/total*100):0;
  el.innerHTML = '覚えた: '+done+' / '+total+'（'+pct+'%）<div class="progressbar"><div style="width:'+pct+'%"></div></div>';
}

function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML='';
  if(state.tab!=='keisu'||state.mode!=='list'&&state.mode!=='card'){/*keep*/}
  if(state.tab==='keisu'){
    const opts=[['all','難易度: 全部'],['none','無印'],['1','★'],['2','★★'],['3+','★★★以上']];
    opts.forEach(([v,l])=>{
      const b=document.createElement('button');
      b.className='btn small'+(state.diffFilter===v?' on':'');
      b.textContent=l;
      b.onclick=()=>{state.diffFilter=v;state.pos[state.tab]=0;state.revealed=false;render();};
      el.appendChild(b);
    });
  }
}

function renderControls(){
  const el=document.getElementById('controls');
  el.innerHTML='';
  if(state.tab==='fumidai') return;
  const search=document.createElement('input');
  search.type='search'; search.placeholder='検索（問題・答え・備考）'; search.value=state.search;
  search.oninput=e=>{state.search=e.target.value;state.pos[state.tab]=0;state.revealed=false;renderMain();renderStats();};
  el.appendChild(search);

  [['card','🃏 カード'],['quiz','✏️ クイズ'],['list','📋 一覧']].forEach(([m,l])=>{
    const b=document.createElement('button');
    b.className='btn'+(state.mode===m?' on':'');
    b.textContent=l;
    b.onclick=()=>{state.mode=m;state.revealed=false;if(m==='quiz')startQuiz();render();};
    el.appendChild(b);
  });

  const shuf=document.createElement('button');
  shuf.className='btn'; shuf.textContent='🔀';
  shuf.title='シャッフル';
  shuf.onclick=shuffleTab;
  el.appendChild(shuf);

  if(state.order[state.tab]){
    const rs=document.createElement('button');
    rs.className='btn'; rs.textContent='↩︎順番';
    rs.onclick=resetOrder;
    el.appendChild(rs);
  }

  const un=document.createElement('button');
  un.className='btn'+(state.onlyUnlearned?' on':'');
  un.textContent='未習得のみ';
  un.onclick=()=>{state.onlyUnlearned=!state.onlyUnlearned;state.pos[state.tab]=0;state.revealed=false;render();};
  el.appendChild(un);
}

  if(tab==='gengo'){
    const g=DATA.gengo[idx];
    let h='';
    g.items.forEach((x,i)=>{
      h+='<div class="ans-row"><span class="letter">'+esc(x.ans||'?')+'</span><span>'+(i+1)+'問目'+(x.memo?'　<span style="color:var(--yellow);font-size:12px">'+esc(x.memo)+'</span>':'')+'</span></div>';
    });
    return h;
  }
  const g=DATA.eigo[idx];
  let h='';
  g.items.forEach((x,i)=>{
    h+='<div class="ans-row"><span class="letter">'+(i+1)+'.</span><span style="color:var(--green);font-weight:700">'+esc(x.ans)+(x.memo?'<div class="memo" style="font-weight:400">💡 '+esc(x.memo)+'</div>':'')+'</span></div>';
  });
  return h;
}

function renderMain(){
  const el=document.getElementById('main');
  el.innerHTML='';
  const tab=state.tab;

  if(tab==='fumidai'){
    let h='<div class="note">C-GABの練習受験（踏み台）に使われている企業リスト。本命受験前の腕試しに。</div><div class="fumidai-grid">';
    DATA.fumidai.forEach(f=>{h+='<div>'+esc(f)+'</div>';});
    el.innerHTML=h+'</div>';
    return;
  }

  const idxs = filteredIndices(tab);
  if(idxs.length===0){
    el.innerHTML='<div class="empty">該当する問題がないで🎉<br>フィルターか検索条件を変えてみて</div>';
    return;
  }

  if(state.mode==='quiz'){
    renderQuiz(el);
    return;
  }

  if(state.mode==='list'){
    idxs.forEach(i=>{
      const id=itemId(tab,i);
      const div=document.createElement('div');
      div.className='list-item';
      let meta='';
      if(tab==='keisu'){
        const it=DATA.keisu[i];
        meta='<div class="meta"><span class="badge">#'+esc(it.num||'-')+'</span><span class="badge diff">'+diffStars(it.diff)+'</span>'+(state.learned[tab][id]?'<span class="badge done">✓ 覚えた</span>':'')+'</div>';
      } else {
        meta='<div class="meta">'+(state.learned[tab][id]?'<span class="badge done">✓ 覚えた</span>':'')+'</div>';
      }
      const shownKey=tab+'_'+i;
      const shown = state.listShown[shownKey];
      div.innerHTML = meta + questionHTML(tab,i).replace('qtext','q') +
        '<div class="a hidden-a'+(shown?' shown':'')+'" data-k="'+shownKey+'">'+answerHTML(tab,i)+'</div>';
      div.querySelector('.hidden-a').onclick=function(){
        state.listShown[shownKey]=!state.listShown[shownKey];
        this.classList.toggle('shown');
      };
      el.appendChild(div);
    });
    return;
  }

  // card mode
  let pos = Math.min(state.pos[tab], idxs.length-1);
  state.pos[tab]=pos;
  const i = idxs[pos];
  const id = itemId(tab,i);
  const card=document.createElement('div');
  card.className='study-card';
  let badges='';
  if(tab==='keisu'){
    const it=DATA.keisu[i];
    badges='<div><span class="badge">#'+esc(it.num||'-')+'</span><span class="badge diff">'+diffStars(it.diff)+'</span>'+(state.learned[tab][id]?'<span class="badge done">✓ 覚えた</span>':'')+'</div>';
  } else {
    badges='<div>'+(state.learned[tab][id]?'<span class="badge done">✓ 覚えた</span>':'')+'</div>';
  }
  card.innerHTML = badges + questionHTML(tab,i) +
    (state.revealed
      ? '<div class="answer">'+answerHTML(tab,i)+'</div>'
      : '<div class="reveal-hint">👆 タップで答えを表示</div>');
  card.onclick=(e)=>{
    if(!state.revealed){state.revealed=true;renderMain();}
  };
  // swipe: 左スワイプ=次へ / 右スワイプ=前へ
  let tx=0, ty=0;
  card.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  card.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0){next(idxs);}
      else{state.pos[tab]=Math.max(0,pos-1);state.revealed=false;saveProgress();render();}
    }
  },{passive:true});
  el.appendChild(card);

  if(state.revealed){
    const judge=document.createElement('div');
    judge.className='judge';
    const ok=document.createElement('button');
    ok.className='btn ok'; ok.textContent='✓ 覚えた';
    ok.onclick=()=>{state.learned[tab][id]=true;saveProgress();next(idxs);};
    const ng=document.createElement('button');
    ng.className='btn ng'; ng.textContent='✗ まだ';
    ng.onclick=()=>{delete state.learned[tab][id];saveProgress();next(idxs);};
    judge.appendChild(ng);judge.appendChild(ok);
    el.appendChild(judge);
  }

  const nav=document.createElement('div');
  nav.className='nav';
  const prev=document.createElement('button');
  prev.className='btn'; prev.textContent='← 前';
  prev.disabled=pos===0;
  prev.onclick=()=>{state.pos[tab]=Math.max(0,pos-1);state.revealed=false;saveProgress();render();};
  const cnt=document.createElement('div');
  cnt.className='counter'; cnt.textContent=(pos+1)+' / '+idxs.length;
  const nx=document.createElement('button');
  nx.className='btn'; nx.textContent='次 →';
  nx.onclick=()=>next(idxs);
  nav.appendChild(prev);nav.appendChild(cnt);nav.appendChild(nx);
  el.appendChild(nav);
}

// ---- quiz mode ----
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQuizQueue(){
  const tab=state.tab;
  const idxs=filteredIndices(tab);
  let q=[];
  if(tab==='keisu'){
    idxs.forEach(i=>q.push({i}));
  } else if(tab==='gengo'){
    idxs.forEach(i=>DATA.gengo[i].items.forEach((_,s)=>q.push({i,s})));
  } else {
    idxs.forEach(i=>DATA.eigo[i].items.forEach((x,s)=>{if(x.ans)q.push({i,s});}));
  }
  return shuffleArr(q);
}

function startQuiz(fromWrongs){
  const z=state.quiz;
  z.queue = fromWrongs ? shuffleArr(z.wrongs.slice()) : buildQuizQueue();
  z.pos=0; z.answered=false; z.choice=-1; z.right=0; z.wrong=0; z.wrongs=[]; z.options=[];
  if(z.queue.length) prepareOptions();
}

function ansBucket(a){
  if(/^正しいのは|^\d+つ$|^[0-9０-９]+つ/.test(a)) return 'count';
  if(/^(19|20)\d{2}/.test(a)||/年$/.test(a)) return 'year';
  if(/^[\d.,:/xX×倍%％\s万億円トン㎥ポイント()（）？?〜~-]+$/.test(a)) return 'num';
  return 'text';
}

function prepareOptions(){
  const z=state.quiz, tab=state.tab, cur=z.queue[z.pos];
  if(tab==='gengo'){ z.options=['A','B','C']; return; }
  let correct, pool;
  if(tab==='keisu'){
    correct=DATA.keisu[cur.i].ans;
    const b=ansBucket(correct);
    pool=DATA.keisu.map(x=>x.ans).filter(a=>a&&a!==correct&&ansBucket(a)===b);
    if(new Set(pool).size<3) pool=pool.concat(DATA.keisu.map(x=>x.ans).filter(a=>a&&a!==correct));
  } else {
    correct=DATA.eigo[cur.i].items[cur.s].ans;
    pool=[];
    DATA.eigo.forEach((g,gi)=>{if(gi!==cur.i)g.items.forEach(x=>{if(x.ans)pool.push(x.ans);});});
  }
  const picks=[]; const seen=new Set([correct]);
  shuffleArr(pool.slice());
  for(const p of shuffleArr(Array.from(new Set(pool)))){
    if(!seen.has(p)){picks.push(p);seen.add(p);}
    if(picks.length===3)break;
  }
  z.options=shuffleArr([correct].concat(picks));
}

function quizCorrectAnswer(){
  const z=state.quiz, tab=state.tab, cur=z.queue[z.pos];
  if(tab==='keisu')return DATA.keisu[cur.i].ans;
  if(tab==='gengo')return DATA.gengo[cur.i].items[cur.s].ans;
  return DATA.eigo[cur.i].items[cur.s].ans;
}

function renderQuiz(el){
  const z=state.quiz, tab=state.tab;
  if(!z.queue.length){
    el.innerHTML='<div class="empty">出題できる問題がないで<br>フィルターを見直してみて</div>';
    return;
  }
  if(z.pos>=z.queue.length){
    const total=z.right+z.wrong;
    const pct=total?Math.round(z.right/total*100):0;
    const div=document.createElement('div');
    div.className='study-card';
    div.style.cursor='default';
    div.innerHTML='<div class="qtext" style="text-align:center">🎉 1周完了！<br><br><b style="font-size:26px">'+z.right+' / '+total+'</b>（正答率 '+pct+'%）<br><br>'+(z.wrongs.length?('間違えた問題: '+z.wrongs.length+'問'):'全問正解や、ええ調子！')+'</div>';
    el.appendChild(div);
    const nav=document.createElement('div');
    nav.className='judge';
    if(z.wrongs.length){
      const b=document.createElement('button');
      b.className='btn ng'; b.textContent='間違いだけ再挑戦';
      b.onclick=()=>{startQuiz(true);render();};
      nav.appendChild(b);
    }
    const b2=document.createElement('button');
    b2.className='btn ok'; b2.textContent='もう1周（全問）';
    b2.onclick=()=>{startQuiz();render();};
    nav.appendChild(b2);
    el.appendChild(nav);
    return;
  }

  const cur=z.queue[z.pos];
  const card=document.createElement('div');
  card.className='study-card';
  card.style.cursor='default';
  let qh='';
  if(tab==='keisu'){
    const it=DATA.keisu[cur.i];
    qh='<div><span class="badge">#'+esc(it.num||'-')+'</span><span class="badge diff">'+diffStars(it.diff)+'</span></div><div class="qtext">'+esc(it.q)+'</div>';
  } else if(tab==='gengo'){
    const g=DATA.gengo[cur.i];
    qh='<div><span class="badge">言語 A/B/C判定</span></div><div class="qtext"><b>「'+esc(g.theme.replace(/^「|」$/g,''))+'」</b><span class="stmt">'+esc(g.items[cur.s].stmt)+'</span></div><div style="font-size:11px;color:var(--sub)">A=論理的に正しい / B=論理的に誤り / C=判断できない</div>';
  } else {
    const g=DATA.eigo[cur.i];
    qh='<div><span class="badge">英語</span></div><div class="qtext"><b>'+esc(g.theme)+'</b><span class="stmt">'+esc(g.items[cur.s].q)+'</span></div>';
  }
  card.innerHTML=qh;
  el.appendChild(card);

  const correct=quizCorrectAnswer();
  const optWrap=document.createElement('div');
  z.options.forEach((opt,oi)=>{
    const b=document.createElement('button');
    b.className='btn';
    b.style.cssText='display:block;width:100%;text-align:left;margin-top:8px;padding:13px 14px;font-size:14px;line-height:1.5;border-radius:12px;white-space:pre-wrap;';
    b.textContent=(tab==='gengo'?opt:String.fromCharCode(65+oi)+'. '+opt);
    if(z.answered){
      if(opt===correct){b.style.borderColor='var(--green)';b.style.color='var(--green)';b.style.background='rgba(62,207,142,.12)';}
      else if(oi===z.choice){b.style.borderColor='var(--red)';b.style.color='var(--red)';b.style.background='rgba(255,107,107,.1)';}
      else{b.style.opacity='.45';}
    } else {
      b.onclick=()=>{
        z.answered=true; z.choice=oi;
        const ok=opt===correct;
        if(ok){z.right++; if(tab==='keisu'){state.learned.keisu[itemId('keisu',cur.i)]=true;saveProgress();}}
        else{z.wrong++; z.wrongs.push(cur); if(tab==='keisu'){delete state.learned.keisu[itemId('keisu',cur.i)];saveProgress();}}
        render();
      };
    }
    optWrap.appendChild(b);
  });
  el.appendChild(optWrap);

  if(z.answered){
    const cur2=z.queue[z.pos];
    let memo='';
    if(tab==='keisu')memo=DATA.keisu[cur2.i].memo;
    else if(tab==='gengo')memo=DATA.gengo[cur2.i].items[cur2.s].memo;
    else memo=DATA.eigo[cur2.i].items[cur2.s].memo;
    if(memo){
      const m=document.createElement('div');
      m.className='answer'; m.style.border='none';
      m.innerHTML='<div class="memo">💡 '+esc(memo)+'</div>';
      el.appendChild(m);
    }
    const nx=document.createElement('button');
    nx.className='btn primary';
    nx.style.cssText='display:block;width:100%;margin-top:14px;padding:14px;font-size:15px;border-radius:12px;';
    nx.textContent='次の問題 →';
    nx.onclick=()=>{z.pos++;z.answered=false;z.choice=-1;if(z.pos<z.queue.length)prepareOptions();render();};
    el.appendChild(nx);
  }

  const cnt=document.createElement('div');
  cnt.className='counter';
  cnt.style.cssText='text-align:center;margin-top:12px;';
  cnt.textContent=(z.pos+1)+' / '+z.queue.length+'　（正解 '+z.right+' / 不正解 '+z.wrong+'）';
  el.appendChild(cnt);
}

function next(idxs){
  const tab=state.tab;
  if(state.pos[tab] < idxs.length-1){state.pos[tab]++;}
  else {state.pos[tab]=0;}
  state.revealed=false;
  saveProgress();
  render();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function safeRender(){
  try{ render(); }
  catch(e){
    document.getElementById('main').innerHTML=
      '<div class="empty" style="color:var(--red)">⚠️ 読み込みエラー<br><br><small style="word-break:break-all">'+e+'</small><br><br>Safariで開き直してみてください</div>';
    console.error(e);
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>{loadProgress().then(safeRender);safeRender();});
} else {
  loadProgress().then(safeRender);
  safeRender();
}
</script>

if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
